                  React.createElement("div", {
                    style: { fontSize:"11px", fontWeight:700, color: p.color, textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:"6px" }
                  }, (lang === "en" ? "Phase" : "Phase") + " " + (activePhase + 1) + " / " + p.phases.length),
                  React.createElement("h2", {
                    style: { margin:0, fontSize:"22px", fontWeight:800, letterSpacing:"-0.03em" }
                  }, lang === "en" ? phase.title : phase.titleDE),
                ),
                React.createElement("div", { style: { textAlign:"center" } },
                  React.createElement("div", { style: { fontSize:"40px" } }, phase.emotion),
                  React.createElement("div", { style: { fontSize:"11px", color:"#9ca3af", fontWeight:600 } }, phase.emotionLabel),
                )
              ),

              /* Tabs */
              React.createElement("div", {
                style: { display:"flex", borderBottom:"1px solid #f3f4f6", padding:"0 28px", overflowX:"auto" }
              },
                Object.entries(tabLabels).map(([key, label]) =>
                  React.createElement("button", {
                    key,
                    onClick: () => setTab(key),
                    style: {
                      padding:"14px 16px", border:"none",
                      borderBottom:"3px solid " + (tab === key ? p.color : "transparent"),
                      background:"none",
                      color: tab === key ? p.color : "#6b7280",
                      cursor:"pointer", fontSize:"13px", fontWeight: tab === key ? 700 : 500,
                      display:"flex", alignItems:"center", gap:"7px", marginRight:"4px",
                      whiteSpace:"nowrap",
                    }
                  },
                    label,
                    React.createElement("span", {
                      style: {
                        background: tab === key ? p.color + "20" : "#f3f4f6",
                        color: tab === key ? p.color : "#9ca3af",
                        borderRadius:"20px", padding:"1px 7px", fontSize:"11px", fontWeight:700,
                      }
                    }, tabCounts[key])
                  )
                )
              ),

              /* Tab Content */
              React.createElement("div", { style: { padding:"24px 28px" } },

                tab === "actions" && React.createElement("div", { style: { display:"flex", flexDirection:"column", gap:"10px" } },
                  phase.actions.map((action, i) =>
                    React.createElement("div", {
                      key: i,
                      style: {
                        display:"flex", alignItems:"flex-start", gap:"14px",
                        padding:"12px 16px", background:"#f9fafb",
                        borderRadius:"10px", border:"1px solid #f3f4f6",
                      }
                    },
                      React.createElement("div", {
                        style: {
                          width:"24px", height:"24px", borderRadius:"50%",
                          background: p.color, color:"#fff", flexShrink:0,
                          display:"flex", alignItems:"center", justifyContent:"center",
                          fontSize:"11px", fontWeight:800,
                        }
                      }, i + 1),
                      React.createElement("span", { style: { fontSize:"13.5px", color:"#374151", lineHeight:1.5 } }, action)
                    )
                  )
                ),

                tab === "touchpoints" && React.createElement("div", { style: { display:"flex", flexWrap:"wrap", gap:"10px" } },
                  phase.touchpoints.map((tp, i) =>
                    React.createElement("div", {
                      key: i,
                      style: {
                        padding:"10px 16px", background:"#f0fdf4",
                        border:"1px solid #bbf7d0", borderRadius:"10px",
                        fontSize:"13px", fontWeight:600, color:"#166534",
                        display:"flex", alignItems:"center", gap:"8px",
                      }
                    }, "📡 " + tp)
                  )
                ),

                tab === "painpoints" && React.createElement("div", { style: { display:"flex", flexDirection:"column", gap:"10px" } },
                  phase.painPoints.map((pp, i) =>
                    React.createElement("div", {
                      key: i,
                      style: {
                        padding:"12px 16px", background:"#fef2f2",
                        border:"1px solid #fecaca", borderRadius:"10px",
                        fontSize:"13px", color:"#991b1b", lineHeight:1.5,
                        display:"flex", alignItems:"flex-start", gap:"10px",
                      }
                    },
                      React.createElement("span", { style: { fontSize:"16px", flexShrink:0 } }, "🔥"),
                      pp
                    )
                  )
                ),

                tab === "opportunities" && React.createElement("div", { style: { display:"flex", flexDirection:"column", gap:"10px" } },
                  phase.opportunities.map((op, i) =>
                    React.createElement("div", {
                      key: i,
                      style: {
                        padding:"12px 16px", background:"#fffbeb",
                        border:"1px solid #fde68a", borderRadius:"10px",
                        fontSize:"13px", color:"#92400e", lineHeight:1.5,
                        display:"flex", alignItems:"flex-start", gap:"10px",
                      }
                    },
                      React.createElement("span", { style: { fontSize:"16px", flexShrink:0 } }, "✦"),
                      op
                    )
                  )
                )
              ),

              /* Footer Nav */
              React.createElement("div", {
                style: {
                  padding:"16px 28px", borderTop:"1px solid #f3f4f6",
                  display:"flex", justifyContent:"space-between", alignItems:"center",
                }
              },
                React.createElement("button", {
                  onClick: goPrev,
                  disabled: activePhase === 0,
                  style: {
                    padding:"8px 18px", borderRadius:"8px",
                    border:"1px solid #e5e7eb",
                    background: activePhase === 0 ? "#f9fafb" : "#fff",
                    color: activePhase === 0 ? "#d1d5db" : "#374151",
                    cursor: activePhase === 0 ? "default" : "pointer",
                    fontSize:"13px", fontWeight:600,
                  }
                }, "← " + (lang === "en" ? "Previous" : "Zurueck")),

                React.createElement("div", { style: { display:"flex", gap:"6px" } },
                  p.phases.map((_, i) =>
                    React.createElement("div", {
                      key: i,
                      onClick: () => { setActivePhase(i); setTab("actions"); },
                      style: {
                        width: i === activePhase ? "20px" : "8px",
                        height:"8px", borderRadius:"4px",
                        background: i === activePhase ? p.color : "#e5e7eb",
                        cursor:"pointer",
                      }
                    })
                  )
                ),

                React.createElement("button", {
                  onClick: goNext,
                  disabled: activePhase === p.phases.length - 1,
                  style: {
                    padding:"8px 18px", borderRadius:"8px", border:"none",
                    background: activePhase === p.phases.length - 1 ? "#f9fafb" : p.color,
                    color: activePhase === p.phases.length - 1 ? "#d1d5db" : "#fff",
                    cursor: activePhase === p.phases.length - 1 ? "default" : "pointer",
                    fontSize:"13px", fontWeight:600,
                  }
                }, (lang === "en" ? "Next" : "Weiter") + " →"),
              )
            ),

            /* Summary Footer */
            React.createElement("div", {
              style: { display:"grid", gridTemplateColumns:"repeat(4, 1fr)", gap:"12px" }
            },
              [
                { label: lang === "en" ? "Total Phases" : "Phasen total",     value: p.phases.length, color: p.color,   icon:"◎" },
                { label: lang === "en" ? "Total Actions" : "Aktionen total",   value: totalActions,    color:"#4f46e5",  icon:"▦" },
                { label: lang === "en" ? "Pain Points" : "Schmerzpunkte",      value: totalPain,       color:"#dc2626",  icon:"🔥" },
                { label: lang === "en" ? "Opportunities" : "Chancen",          value: totalOpp,        color:"#d97706",  icon:"✦" },
              ].map((stat, i) =>
                React.createElement("div", {
                  key: i,
                  style: {
                    background:"#fff", border:"1px solid #e8e4df",
                    borderRadius:"12px", padding:"16px 18px",
                    display:"flex", alignItems:"center", gap:"12px",
                  }
                },
                  React.createElement("div", {
                    style: {
                      width:"36px", height:"36px", borderRadius:"10px",
                      background: stat.color + "15",
                      display:"flex", alignItems:"center", justifyContent:"center", fontSize:"16px",
                    }
                  }, stat.icon),
                  React.createElement("div", null,
                    React.createElement("div", { style: { fontSize:"22px", fontWeight:800, letterSpacing:"-0.03em", color: stat.color } }, stat.value),
                    React.createElement("div", { style: { fontSize:"11px", color:"#9ca3af", fontWeight:600 } }, stat.label),
                  )
                )
              )
            )
          )
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>

</body>
</html>
